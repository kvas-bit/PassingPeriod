<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crystal Morph v5</title>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #08090a; color: #fff;
  font-family: -apple-system, 'Inter', sans-serif;
  display: flex; flex-direction: column; align-items: center;
  padding: 28px 24px 64px; min-height: 100vh;
}
h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 5px; }
.sub { color: rgba(255,255,255,0.38); font-size: 13px; margin-bottom: 24px; text-align: center; line-height: 1.5; }

.phone {
  width: 268px; height: 548px; background: #08090a;
  border-radius: 44px; border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.04), inset 0 1px 0 rgba(255,255,255,0.14), 0 60px 120px rgba(0,0,0,0.9);
  overflow: hidden; position: relative; flex-shrink: 0;
}
.bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 18%, rgba(180,195,255,0.05) 0%, transparent 62%),
    radial-gradient(ellipse 45% 35% at 82% 82%, rgba(210,175,255,0.035) 0%, transparent 55%),
    radial-gradient(ellipse 38% 30% at 14% 62%, rgba(175,255,215,0.03) 0%, transparent 50%);
}
.top-bar {
  position: absolute; top: 0; left: 0; right: 0;
  padding: 17px 20px 13px;
  display: flex; justify-content: space-between; align-items: center; z-index: 20;
}
.subj { font-size: 9px; letter-spacing: 2px; color: rgba(255,255,255,0.25); font-weight: 500; }
.qbadge { font-size: 9px; color: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.09); padding: 2px 8px; border-radius: 100px; letter-spacing: 0.5px; }
.irid {
  position: absolute; left: 0; right: 0; height: 1px; z-index: 20;
  background: linear-gradient(90deg, transparent, rgba(185,205,255,0.28) 25%, rgba(215,185,255,0.2) 50%, rgba(185,255,215,0.26) 75%, transparent);
  animation: flow 6s linear infinite; background-size: 200% 100%;
}
@keyframes flow { to { background-position: 200% 0; } }
.irid-top { top: 50px; }
.irid-bot { bottom: 48px; }
.qtext {
  position: absolute; top: 62px; left: 0; right: 0;
  padding: 14px 22px 0;
  font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.82);
  text-align: center; line-height: 1.55; z-index: 20; min-height: 60px;
}
#cc {
  position: absolute; top: 128px; left: 0; right: 0; height: 236px; z-index: 10;
  display: flex; align-items: center; justify-content: center;
}
.slabel {
  position: absolute; top: 366px; left: 0; right: 0;
  font-size: 8px; letter-spacing: 2px; color: rgba(255,255,255,0.16);
  text-align: center; z-index: 20; font-weight: 500; transition: opacity 0.4s;
}
.waveform {
  position: absolute; bottom: 96px; left: 0; right: 0;
  display: flex; align-items: center; justify-content: center;
  gap: 2.5px; height: 30px; z-index: 20;
}
.wb { width: 2.5px; border-radius: 100px; background: linear-gradient(180deg, rgba(185,205,255,0.85), rgba(185,255,215,0.5)); transform-origin: center; }
.chip { position: absolute; bottom: 64px; left: 0; right: 0; display: flex; justify-content: center; z-index: 20; }
.chip span {
  font-size: 8.5px; letter-spacing: 2.5px; color: rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-top-color: rgba(255,255,255,0.18); padding: 5px 14px; border-radius: 100px;
}
.irid-bot { bottom: 48px; }
.endbtn { position: absolute; bottom: 18px; left: 0; right: 0; display: flex; justify-content: center; z-index: 20; }
.endbtn span { font-size: 10px; color: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.07); border-radius: 100px; padding: 5px 18px; }

.ctrl { margin-top: 24px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.cbtn {
  font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.38);
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09);
  border-radius: 100px; padding: 8px 16px; cursor: pointer; transition: all 0.2s;
}
.cbtn:hover { background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.65); }
.cbtn.on { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.32); color: #fff; }
.hint { font-size: 11px; color: rgba(255,255,255,0.2); text-align: center; margin-top: 10px; letter-spacing: 0.3px; }
</style>
</head>
<body>
<h2>Geometric Crystal · Liquid Morph v5</h2>
<p class="sub">Geometric at rest. Liquid between. Iridescent, no accent color.</p>

<div class="phone">
  <div class="bg"></div>
  <div class="top-bar"><div class="subj">PHYSICS 101</div><div class="qbadge">Q 2 / 5</div></div>
  <div class="irid irid-top"></div>
  <div class="qtext" id="qtext">What are Newton's three laws of motion?</div>
  <div id="cc"></div>
  <div class="slabel" id="slabel">CUBE</div>
  <div class="waveform">
    <div class="wb" style="height:5px"></div><div class="wb" style="height:9px"></div>
    <div class="wb" style="height:16px"></div><div class="wb" style="height:24px"></div>
    <div class="wb" style="height:28px"></div><div class="wb" style="height:22px"></div>
    <div class="wb" style="height:18px"></div><div class="wb" style="height:13px"></div>
    <div class="wb" style="height:8px"></div><div class="wb" style="height:20px"></div>
    <div class="wb" style="height:26px"></div><div class="wb" style="height:18px"></div>
    <div class="wb" style="height:7px"></div>
  </div>
  <div class="chip"><span id="chip">LISTENING</span></div>
  <div class="irid irid-bot"></div>
  <div class="endbtn"><span>End session</span></div>
</div>

<div class="ctrl">
  <button class="cbtn on"  onclick="setState('listening',this)">Listening</button>
  <button class="cbtn"     onclick="setState('speaking',this)">AI Speaking</button>
  <button class="cbtn"     onclick="setState('evaluating',this)">Evaluating</button>
  <button class="cbtn"     onclick="setState('correct',this)">Correct!</button>
</div>
<div class="hint">← tap to simulate states</div>

<script>
// Wait for layout before measuring container
window.addEventListener('load', init);

function init() {
  const cont = document.getElementById('cc');
  const W = 240, H = 236;

  // ── Renderer ──────────────────────────────────────────────
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.4;
  cont.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  const cam = new THREE.PerspectiveCamera(40, W / H, 0.1, 100);
  cam.position.set(0, 0, 3.8);

  // ── Lighting ───────────────────────────────────────────────
  // Brighter ambient so shape faces in shadow aren't invisible
  scene.add(new THREE.AmbientLight(0x8090b0, 0.8));

  // Key — strong white from above-right
  const key = new THREE.DirectionalLight(0xffffff, 4.5);
  key.position.set(2, 4, 2.5);
  scene.add(key);

  // Four iridescent rims — spectral shimmer, no single accent color
  [[0xa8c8ff, -2.5,  0.5, -2.0, 1.8],
   [0xd0a0ff,  2.5, -1.5, -2.0, 1.4],
   [0xa0ffd0, -1.0,  2.5, -2.5, 1.5],
   [0xfff0b0,  2.5,  2.5,  1.5, 0.9],
  ].forEach(([col, x, y, z, i]) => {
    const l = new THREE.DirectionalLight(col, i);
    l.position.set(x, y, z);
    scene.add(l);
  });

  // Fill from below
  const fill = new THREE.DirectionalLight(0x506070, 0.7);
  fill.position.set(0, -3, 1);
  scene.add(fill);

  // ── Geometry: IcosahedronGeometry (indexed) ────────────────
  // detail=2 → 162 unique vertices, 320 faces
  // flatShading on material uses fragment derivatives → works with indexed
  const geo = new THREE.IcosahedronGeometry(1, 2);
  const posArr = geo.attributes.position.array; // 162*3 = 486 floats
  const nVerts = geo.attributes.position.count; // 162

  // Save unit-direction for each vertex
  const DIR = new Float32Array(nVerts * 3);
  for (let i = 0; i < nVerts; i++) {
    const x = posArr[i*3], y = posArr[i*3+1], z = posArr[i*3+2];
    const r = Math.sqrt(x*x + y*y + z*z) || 1;
    DIR[i*3] = x/r; DIR[i*3+1] = y/r; DIR[i*3+2] = z/r;
  }

  // ── Material ───────────────────────────────────────────────
  // Visible dark grey + iridescence. No transmission (was causing invisibility).
  // flatShading via fragment derivatives (works with indexed geo).
  const mat = new THREE.MeshPhysicalMaterial({
    color:          new THREE.Color(0x2c3040),  // dark grey-blue — visible
    roughness:      0.04,
    metalness:      0.55,                        // metallic → reflects irid lights
    iridescence:    1.0,
    iridescenceIOR: 2.2,
    iridescenceThicknessRange: [80, 900],
    flatShading:    true,
    side:           THREE.DoubleSide,
    emissive:       new THREE.Color(0x080a12),
    emissiveIntensity: 0.6,
  });

  const mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh);

  // Thin wireframe — reinforces crisp edges
  const wfMesh = new THREE.Mesh(
    geo,
    new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.055 })
  );
  scene.add(wfMesh);

  // ── Shape functions ────────────────────────────────────────
  // N-gon prism: n sides, half-height h
  function prismR(nx, ny, nz, n, h) {
    const rXZ = Math.sqrt(nx*nx + nz*nz) || 1e-7;
    const phi  = Math.atan2(nz, nx);
    const sec  = (2 * Math.PI) / n;
    const ang  = ((phi % sec) + sec) % sec;
    // Inradius of regular n-gon at angle ang
    const faceR = Math.cos(Math.PI / n) / Math.cos(ang - Math.PI / n);
    const capFrac  = Math.abs(ny) / h;
    const sideFrac = rXZ / faceR;
    return capFrac > sideFrac
      ? h / (Math.abs(ny) || 1e-7)
      : faceR / rXZ;
  }

  function sCylinder(nx, ny, nz) {
    const rXZ = Math.sqrt(nx*nx + nz*nz) || 1e-7;
    const h = 0.72;
    return Math.abs(ny) / h > rXZ ? h / (Math.abs(ny) || 1e-7) : 1.0 / rXZ;
  }

  function sStar(nx, ny, nz) {
    const rXZ = Math.sqrt(nx*nx + nz*nz) || 1e-7;
    const phi  = Math.atan2(nz, nx);
    const sec  = Math.PI / 5;  // half-sector for 5-point star
    const ang  = ((phi % (2*sec)) + 2*sec) % (2*sec);
    const t    = Math.abs(ang - sec) / sec;  // 0=inner valley 1=outer tip
    const R    = 0.38 + 0.70 * Math.pow(t, 0.6);
    const h    = 0.50;
    return Math.abs(ny)/h > rXZ/R
      ? h / (Math.abs(ny) || 1e-7)
      : R / rXZ;
  }

  const SHAPES = {
    cube:     (nx,ny,nz) => prismR(nx,ny,nz, 4, 0.80) * 0.84,
    prism:    (nx,ny,nz) => prismR(nx,ny,nz, 3, 0.82) * 0.90,
    sphere:   ()         => 1.00,
    cylinder: sCylinder,
    pentagon: (nx,ny,nz) => prismR(nx,ny,nz, 5, 0.72) * 0.90,
    octagon:  (nx,ny,nz) => prismR(nx,ny,nz, 8, 0.66) * 0.92,
    star:     sStar,
  };

  // Pre-bake target positions for every shape
  const TARGETS = {};
  for (const [name, fn] of Object.entries(SHAPES)) {
    const arr = new Float32Array(nVerts * 3);
    for (let i = 0; i < nVerts; i++) {
      const nx = DIR[i*3], ny = DIR[i*3+1], nz = DIR[i*3+2];
      const r  = Math.max(0.15, Math.min(4.0, fn(nx, ny, nz)));
      arr[i*3]   = nx * r;
      arr[i*3+1] = ny * r;
      arr[i*3+2] = nz * r;
    }
    TARGETS[name] = arr;
  }

  // ── Morph state ────────────────────────────────────────────
  let fromPos  = TARGETS.cube.slice();
  let toPos    = TARGETS.cube.slice();
  let morphT   = 1.0, morphMs = 900, morphStart = 0;

  // PURE LIQUID amplitude — large so it goes genuinely formless mid-transition
  const LIQ_AMP = 0.68;

  function liquid(nx, ny, nz, t) {
    return (
      Math.sin(nx*4.8 + t*2.2) * 0.28 +
      Math.sin(ny*3.9 + t*1.7 + nz*2.3) * 0.24 +
      Math.sin(nz*5.7 + t*3.0 + nx*1.5) * 0.20 +
      Math.sin((nx+ny)*3.3 + t*2.5) * 0.16 +
      Math.sin((ny+nz)*2.6 + t*1.4 + nx*3.0) * 0.12
    );
  }

  function startMorph(shapeName, ms) {
    // Freeze CURRENT rendered positions as "from"
    fromPos = posArr.slice();
    toPos   = TARGETS[shapeName];
    morphT  = 0;
    morphMs = ms || 1000;
    morphStart = performance.now();
    document.getElementById('slabel').textContent = shapeName.toUpperCase();
  }

  function ease(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2; }

  // ── Render loop ────────────────────────────────────────────
  function animate(now) {
    requestAnimationFrame(animate);
    const t = now * 0.001;

    if (morphT < 1) morphT = Math.min((now - morphStart) / morphMs, 1.0);

    const te  = ease(morphT);
    // sin envelope: 0 at shape boundaries, peaks mid-transition = full liquid
    const env = LIQ_AMP * Math.sin(morphT * Math.PI);

    for (let i = 0; i < nVerts; i++) {
      const nx = DIR[i*3], ny = DIR[i*3+1], nz = DIR[i*3+2];
      let x = fromPos[i*3]   + (toPos[i*3]   - fromPos[i*3])   * te;
      let y = fromPos[i*3+1] + (toPos[i*3+1] - fromPos[i*3+1]) * te;
      let z = fromPos[i*3+2] + (toPos[i*3+2] - fromPos[i*3+2]) * te;
      if (env > 0.004) {
        const d = env * liquid(nx, ny, nz, t);
        x += nx*d; y += ny*d; z += nz*d;
      }
      posArr[i*3]   = x;
      posArr[i*3+1] = y;
      posArr[i*3+2] = z;
    }

    geo.attributes.position.needsUpdate = true;
    geo.computeVertexNormals();

    const br = 1 + 0.006 * Math.sin(t * 0.82);
    mesh.scale.setScalar(br);
    wfMesh.scale.copy(mesh.scale);

    mesh.rotation.y = t * 0.20;
    mesh.rotation.x = Math.sin(t * 0.13) * 0.10;
    wfMesh.rotation.copy(mesh.rotation);

    renderer.render(scene, cam);
    animateWave(now);
  }
  requestAnimationFrame(animate);

  // ── State cycling ──────────────────────────────────────────
  const PAIRS = {
    listening:  ['cube', 'prism'],
    speaking:   ['sphere', 'cylinder'],
    evaluating: ['pentagon', 'octagon'],
    correct:    ['star'],
  };
  let cycleKey = 'listening', cycleIdx = 0, autoTimer;

  function nextCycle() {
    if (!PAIRS[cycleKey]) return;
    const pair = PAIRS[cycleKey];
    cycleIdx = (cycleIdx + 1) % pair.length;
    startMorph(pair[cycleIdx]);
    if (pair.length > 1) autoTimer = setTimeout(nextCycle, 2500 + Math.random()*900);
  }

  // ── Waveform ───────────────────────────────────────────────
  const bars = document.querySelectorAll('.wb');
  let waveOn = true;
  function animateWave(now) {
    bars.forEach((b, i) => {
      if (!waveOn) { b.style.transform = 'scaleY(0.18)'; b.style.opacity = '0.18'; return; }
      const s = 0.25 + 0.75 * (0.5 + 0.5 * Math.sin(now/780 + i*0.44));
      b.style.transform = `scaleY(${s.toFixed(3)})`;
      b.style.opacity = (0.28 + 0.72*s).toFixed(3);
    });
  }

  // ── State switching ────────────────────────────────────────
  const CFG = {
    listening:  { label:'LISTENING',   wave:true,  q:"What are Newton's three laws of motion?" },
    speaking:   { label:'AI SPEAKING', wave:true,  q:"Great start — the first law is inertia. Can you name the second?" },
    evaluating: { label:'EVALUATING',  wave:false, q:"Evaluating your answer…" },
    correct:    { label:'CORRECT',     wave:false, q:"Excellent! 3/3 correct — best session yet." },
  };

  window.setState = function(key, btn) {
    const cfg = CFG[key];
    document.getElementById('chip').textContent  = cfg.label;
    document.getElementById('qtext').textContent = cfg.q;
    waveOn = cfg.wave;
    document.querySelectorAll('.cbtn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    clearTimeout(autoTimer);
    cycleKey = key; cycleIdx = 0;
    const pair = PAIRS[key] || ['cube'];
    startMorph(pair[0], key === 'correct' ? 600 : 1000);
    if (pair.length > 1) autoTimer = setTimeout(nextCycle, 2700);
  };

  // Init — force first shape immediately
  for (let i = 0; i < nVerts; i++) {
    posArr[i*3]   = TARGETS.cube[i*3];
    posArr[i*3+1] = TARGETS.cube[i*3+1];
    posArr[i*3+2] = TARGETS.cube[i*3+2];
  }
  geo.attributes.position.needsUpdate = true;
  geo.computeVertexNormals();
  fromPos = TARGETS.cube.slice();
  toPos   = TARGETS.cube.slice();
  morphT  = 1.0;

  autoTimer = setTimeout(nextCycle, 2800);
}
</script>
</body>
</html>
